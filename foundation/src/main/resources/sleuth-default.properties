# Java-Sleuth Default Configuration
# This file contains default settings for Java-Sleuth agent
# Override these settings by creating sleuth.properties in the config directory

# =============================================================================
# SERVER CONFIGURATION
# =============================================================================

# Port for the command server (default: 3658)
server.bind.address=127.0.0.1
server.port=3658

# Maximum number of concurrent connections
server.max.connections=10

# Backpressure: max queued connection handling tasks (avoid unbounded memory under flood)
server.executor.queue.capacity=50

# Connection timeout in milliseconds
server.connection.timeout=30000

# Socket timeout in milliseconds for accept operations
server.socket.timeout=1000

# =============================================================================
# PERFORMANCE CONFIGURATION
# =============================================================================

# Cache time-to-live in milliseconds (5 seconds)
performance.cache.ttl=5000

# Thread pool core size
performance.thread.pool.core=4

# Thread pool maximum size
performance.thread.pool.max=16

# Dedicated command execution executor (avoid unbounded cached thread pool)
performance.command.executor.core=4
performance.command.executor.max=16
performance.command.executor.queue.capacity=200

# Command execution timeout in milliseconds
performance.command.timeout=60000

# Maximum allowed command timeout in milliseconds (upper bound guardrail)
performance.command.timeout.max=300000

# Force periodic System.gc() during maintenance (NOT recommended in production)
performance.maintenance.force_gc=false

# Enhancement failure strategy (cooldown + retry)
enhancement.failure.cooldown.ms=30000
enhancement.failure.log.interval.ms=60000

# =============================================================================
# JOBS CONFIGURATION
# =============================================================================
#
# Background/streaming job retention limits (used by jobs/stream-capable commands)
jobs.max=200
jobs.ttl.ms=3600000
jobs.output.max.bytes=262144
# Hard cap on concurrent background jobs + bounded queue for backpressure
jobs.max.running=4
jobs.queue.capacity=20

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================

# Enable input validation (true/false)
security.input.validation=true

# Enable audit logging (true/false)
security.audit.logging=true

# Maximum command length in characters
security.max.command.length=1000

# Comma-separated list of allowed commands (* for all)
security.allowed.commands=*

# Dangerous command confirmation
# When enabled, dangerous commands (redefine/retransform/mc/heapdump/reset/stop, etc.) require a one-time token.
security.dangerous.confirm.enabled=false
security.dangerous.confirm.ttl.ms=60000
security.dangerous.confirm.token.bytes=12
security.dangerous.confirm.cache.size=2000

# High impact commands governance
security.impact.high.confirm.enabled=false
security.impact.high.concurrent.limit=1

# =============================================================================
# MONITORING CONFIGURATION
# =============================================================================

# Enable metrics collection (true/false)
monitoring.metrics.enabled=true

# Enable health checks (true/false)
monitoring.health.checks=true

# Cache cleanup interval in milliseconds (5 minutes)
monitoring.cache.cleanup.interval=300000

# Enable JMX monitoring (true/false)
monitoring.jmx.enabled=true

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================

# Logging level (TRACE, DEBUG, INFO, WARN, ERROR)
logging.level=INFO

# Enable/disable SleuthLogger console output (written to stderr).
# Tip: unit tests can set -Dsleuth.logging.level=ERROR to reduce noise while keeping failures visible.
logging.console.enabled=true

# Enable audit logging to file (true/false)
logging.audit.enabled=true

# Mirror audit events to console (avoid enabling in production / target JVM by default)
logging.audit.console.enabled=false

# Audit log file paths (empty = default to java.io.tmpdir with pid suffix)
logging.audit.file.path=
logging.security.file.path=

# Enable performance logging (true/false)
# Performance/health logging to stdout/stderr is noisy in production; keep it opt-in.
logging.performance.enabled=false

# =============================================================================
# PROTOCOL CONFIGURATION
# =============================================================================
protocol.streaming.enabled=true
protocol.frame.max.payload=4096
# Max UTF-8 bytes per single-line request/response in the text handshake/control-plane.
protocol.text.max.line.bytes=8192

# =============================================================================
# PLUGIN CONFIGURATION
# =============================================================================
# Plugins are disabled by default for supply-chain safety. Enable explicitly if needed.
plugins.enabled=false
# When plugins.enabled=false, ServiceLoader-based providers from the target application's classpath are not loaded by default.
plugins.serviceloader.enabled=false
# Optional allowlist when plugins.enabled=true:
# Comma-separated entries in the form: jarName:sha256hex
plugins.allowlist.sha256=
plugins.directory=plugins
plugins.conflict.strategy=prefer-builtin

# =============================================================================
# MONITORING QUEUE CONFIGURATION
# =============================================================================
monitoring.watch.queue.capacity=1000
monitoring.watch.drop.on.full=true
monitoring.trace.queue.capacity=2000
monitoring.trace.drop.on.full=true

# =============================================================================
# SECURITY AUTHORIZATION CONFIGURATION
# =============================================================================
security.authorization.enabled=false
security.anonymous.viewer=true

# Password-based authentication (disabled by default; recommended on multi-user hosts)
security.auth.password.enabled=false
security.auth.admin.password=
security.auth.operator.password=
security.auth.viewer.password=
