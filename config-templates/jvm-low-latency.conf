# Java-Sleuth Low-Latency JVM Configuration
# Optimized for ultra-low latency applications (trading systems, real-time processing)

# =============================================================================
# MEMORY CONFIGURATION - LOW LATENCY
# =============================================================================

# Larger heap to reduce GC frequency
-Xms4g
-Xmx8g

# Pre-allocate metaspace to avoid runtime allocation
-XX:MetaspaceSize=512m
-XX:MaxMetaspaceSize=512m

# Larger direct memory for off-heap structures
-XX:MaxDirectMemorySize=2g

# =============================================================================
# ULTRA-LOW LATENCY GARBAGE COLLECTION
# =============================================================================

# ZGC for sub-10ms pause times (Java 11+)
-XX:+UnlockExperimentalVMOptions
-XX:+UseZGC
-XX:ZCollectionInterval=5
-XX:ZUncommitDelay=300

# Alternative: Shenandoah for low-pause collection (OpenJDK)
# -XX:+UnlockExperimentalVMOptions
# -XX:+UseShenandoahGC
# -XX:ShenandoahGCHeuristics=aggressive

# Alternative: G1GC with aggressive low-latency tuning
# -XX:+UseG1GC
# -XX:MaxGCPauseMillis=10
# -XX:G1HeapRegionSize=32m
# -XX:G1NewSizePercent=40
# -XX:G1MaxNewSizePercent=50
# -XX:+G1UseAdaptiveIHOP
# -XX:G1AdaptiveIHOPNumInitialSamples=1

# Disable explicit GC calls
-XX:+DisableExplicitGC

# =============================================================================
# AGGRESSIVE PERFORMANCE OPTIMIZATIONS
# =============================================================================

# Large pages - CRITICAL for low latency
-XX:+UseLargePages
-XX:LargePageSizeInBytes=2m

# Lock optimizations
-XX:+UseBiasedLocking
-XX:BiasedLockingStartupDelay=0
-XX:+EliminateLocks
-XX:+DoEscapeAnalysis

# Aggressive JIT optimizations
-XX:+AggressiveOpts
-XX:+UseCompressedOops
-XX:+UseCompressedClassPointers
-XX:+OptimizeStringConcat

# Fast allocation
-XX:+UseTLAB
-XX:TLABSize=1m
-XX:+ResizeTLAB

# Inline optimizations
-XX:MaxInlineLevel=20
-XX:InlineSmallCode=2000

# Code cache optimization for hot methods
-XX:InitialCodeCacheSize=128m
-XX:ReservedCodeCacheSize=512m
-XX:CodeCacheExpansionSize=64k

# =============================================================================
# SYSTEM-LEVEL OPTIMIZATIONS
# =============================================================================

# NUMA awareness
-XX:+UseNUMA

# Prefetch optimizations
-XX:AllocatePrefetchStyle=2
-XX:AllocatePrefetchDistance=256

# Spin lock optimizations
-XX:+UseSpinning
-XX:PreBlockSpin=20

# =============================================================================
# REAL-TIME CHARACTERISTICS
# =============================================================================

# Avoid swap at all costs
-XX:+AlwaysPreTouch

# Reduce system call overhead
-Djava.net.preferIPv4Stack=true

# Fast random number generation
-Djava.security.egd=file:/dev/urandom

# =============================================================================
# MINIMAL MONITORING (REDUCE OVERHEAD)
# =============================================================================

# Minimal GC logging to reduce I/O overhead
-Xloggc:logs/gc-lowlatency.log
-XX:+PrintGC
-XX:+PrintGCTimeStamps
-XX:+UseGCLogFileRotation
-XX:NumberOfGCLogFiles=3
-XX:GCLogFileSize=5M

# Essential JMX only
-Dcom.sun.management.jmxremote
-Dcom.sun.management.jmxremote.port=9999
-Dcom.sun.management.jmxremote.authenticate=false
-Dcom.sun.management.jmxremote.ssl=false

# Disable verbose class loading
-verbose:gc

# =============================================================================
# LATENCY-SPECIFIC TUNING
# =============================================================================

# Reduce compilation threshold for faster warmup
-XX:CompileThreshold=1000
-XX:Tier3CompileThreshold=1000
-XX:Tier4CompileThreshold=1500

# Aggressive tiered compilation
-XX:+TieredCompilation
-XX:TieredStopAtLevel=4

# Reduce safepoint frequency
-XX:+ReduceSignalUsage

# =============================================================================
# APPLICATION PROPERTIES
# =============================================================================

# Encoding
-Dfile.encoding=UTF-8

# Low-latency application mode
-Dsleuth.production.mode=true
-Dsleuth.low.latency.mode=true
-Dsleuth.performance.cache.ttl=1000
-Dsleuth.performance.thread.pool.core=16
-Dsleuth.performance.thread.pool.max=16

# Configuration paths
-Dsleuth.config.dir=${SLEUTH_CONFIG}
-Dsleuth.logs.dir=${SLEUTH_LOGS}

# =============================================================================
# CONTAINER OPTIMIZATION
# =============================================================================

# For containerized low-latency applications
-XX:+UseContainerSupport
-XX:ActiveProcessorCount=4

# =============================================================================
# CRITICAL NOTES FOR LOW-LATENCY DEPLOYMENTS
# =============================================================================

# SYSTEM REQUIREMENTS:
# 1. Dedicated CPU cores (isolcpus kernel parameter)
# 2. Large pages configured in OS (echo 2048 > /sys/kernel/mm/hugepages/hugepages-2048kB/nr_hugepages)
# 3. High-resolution timers enabled
# 4. Disable swap (swapoff -a)
# 5. CPU governor set to performance mode
# 6. IRQ affinity tuned to avoid application cores

# MONITORING:
# 1. Use JFR with minimal overhead settings
# 2. Monitor allocation rates carefully
# 3. Track GC pause times with external tools
# 4. Profile allocation patterns to minimize GC pressure

# VALIDATION:
# 1. Measure 99.99th percentile latencies
# 2. Test under sustained load
# 3. Validate pause time goals are met consistently
# 4. Monitor for allocation hotspots