# Java-Sleuth Production Configuration Template
# Copy this file to sleuth.properties and customize for your environment

# =============================================================================
# SERVER CONFIGURATION - PRODUCTION SETTINGS
# =============================================================================

# Bind address (loopback-only; non-loopback binds are refused)
server.bind.address=127.0.0.1

# Server port (ensure this port is available and not conflicting)
server.port=3658

# Increase connection limits for production load
server.max.connections=50

# Backpressure for connection acceptance (memory bound under flood)
server.executor.queue.capacity=50

# Longer timeouts for production stability
server.connection.timeout=60000
server.socket.timeout=2000

# =============================================================================
# PERFORMANCE CONFIGURATION - PRODUCTION TUNING
# =============================================================================

# Longer cache TTL for better performance in production
performance.cache.ttl=10000

# Larger thread pools for production load
performance.thread.pool.core=8
performance.thread.pool.max=32

# Dedicated command execution executor (avoid unbounded cached thread pool)
performance.command.executor.core=8
performance.command.executor.max=32
performance.command.executor.queue.capacity=200

# Longer command timeout for complex operations
performance.command.timeout=120000

# Maximum allowed command timeout in milliseconds (upper bound guardrail)
performance.command.timeout.max=300000

# Enhancement failure strategy (cooldown + retry)
enhancement.failure.cooldown.ms=30000
enhancement.failure.log.interval.ms=60000

# =============================================================================
# JOBS CONFIGURATION - RETENTION LIMITS
# =============================================================================
jobs.max=200
jobs.ttl.ms=3600000
jobs.output.max.bytes=262144
# Hard cap on concurrent background jobs + bounded queue for backpressure
jobs.max.running=4
jobs.queue.capacity=20

# =============================================================================
# SECURITY CONFIGURATION - PRODUCTION HARDENING
# =============================================================================

# Always enable security features in production
security.input.validation=true
security.audit.logging=true

# Transport/request signing:
# - HMAC mode has been removed.
# - The command server is loopback-only (127.0.0.1/localhost/::1).
# - For multi-user hosts, enable password authentication + authorization below.

# Dangerous command confirmation (recommended)
security.dangerous.confirm.enabled=true
security.dangerous.confirm.ttl.ms=60000
security.dangerous.confirm.token.bytes=12
security.dangerous.confirm.cache.size=2000

# High impact commands governance (recommended)
security.impact.high.confirm.enabled=true
security.impact.high.concurrent.limit=1

# Authorization/RBAC (recommended on multi-user hosts)
security.authorization.enabled=true
# Allow unauthenticated viewer sessions (set false to require login for all access)
security.anonymous.viewer=true

# Password-based authentication (optional; disabled by default)
security.auth.password.enabled=true
security.auth.admin.password=
security.auth.operator.password=
security.auth.viewer.password=

# Larger command length limit for production use
security.max.command.length=2000

# In production, consider restricting commands:
# security.allowed.commands=dashboard,thread,sc,sm,jvm,memory,health,status,metrics
# For full access (default):
security.allowed.commands=*

# =============================================================================
# MONITORING CONFIGURATION - PRODUCTION MONITORING
# =============================================================================

# Enable all monitoring features in production
monitoring.metrics.enabled=true
monitoring.health.checks=true
monitoring.jmx.enabled=true

# More frequent cleanup in production
monitoring.cache.cleanup.interval=300000

# =============================================================================
# LOGGING CONFIGURATION - PRODUCTION LOGGING
# =============================================================================

# INFO level for production (change to DEBUG for troubleshooting)
logging.level=INFO

# Always enable audit logging in production
logging.audit.enabled=true
logging.audit.console.enabled=false
logging.audit.file.path=/opt/java-sleuth/logs/sleuth-audit.log
logging.security.file.path=/opt/java-sleuth/logs/sleuth-security.log
logging.performance.enabled=false

# =============================================================================
# PROTOCOL CONFIGURATION
# =============================================================================
protocol.streaming.enabled=true
protocol.frame.max.payload=4096
protocol.text.max.line.bytes=8192

# =============================================================================
# PLUGIN CONFIGURATION
# =============================================================================
plugins.enabled=false
plugins.serviceloader.enabled=false
# Optional allowlist when plugins.enabled=true:
# Comma-separated entries in the form: jarName:sha256hex
plugins.allowlist.sha256=
plugins.directory=/opt/java-sleuth/plugins
plugins.conflict.strategy=prefer-builtin

# =============================================================================
# MONITORING QUEUE CONFIGURATION
# =============================================================================
monitoring.watch.queue.capacity=1000
monitoring.watch.drop.on.full=true
monitoring.trace.queue.capacity=2000
monitoring.trace.drop.on.full=true

# =============================================================================
# SECURITY AUTHORIZATION CONFIGURATION
# =============================================================================
security.authorization.enabled=true
security.anonymous.viewer=false

# =============================================================================
# ENVIRONMENT SPECIFIC OVERRIDES
# =============================================================================
# These can be overridden via system properties:
# -Dsleuth.server.port=3658
# -Dsleuth.security.input.validation=true
# -Dsleuth.monitoring.metrics.enabled=true
