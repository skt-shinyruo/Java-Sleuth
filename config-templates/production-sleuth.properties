# Java-Sleuth Production Configuration Template
# Copy this file to sleuth.properties and customize for your environment

# =============================================================================
# SERVER CONFIGURATION - PRODUCTION SETTINGS
# =============================================================================

# Server port (ensure this port is available and not conflicting)
server.port=3658

# Increase connection limits for production load
server.max.connections=50

# Longer timeouts for production stability
server.connection.timeout=60000
server.socket.timeout=2000

# =============================================================================
# PERFORMANCE CONFIGURATION - PRODUCTION TUNING
# =============================================================================

# Longer cache TTL for better performance in production
performance.cache.ttl=10000

# Larger thread pools for production load
performance.thread.pool.core=8
performance.thread.pool.max=32

# Longer command timeout for complex operations
performance.command.timeout=120000

# =============================================================================
# SECURITY CONFIGURATION - PRODUCTION HARDENING
# =============================================================================

# Always enable security features in production
security.input.validation=true
security.audit.logging=true

# Larger command length limit for production use
security.max.command.length=2000

# In production, consider restricting commands:
# security.allowed.commands=dashboard,thread,sc,sm,jvm,memory,health,status,metrics
# For full access (default):
security.allowed.commands=*

# =============================================================================
# MONITORING CONFIGURATION - PRODUCTION MONITORING
# =============================================================================

# Enable all monitoring features in production
monitoring.metrics.enabled=true
monitoring.health.checks=true
monitoring.jmx.enabled=true

# More frequent cleanup in production
monitoring.cache.cleanup.interval=300000

# =============================================================================
# LOGGING CONFIGURATION - PRODUCTION LOGGING
# =============================================================================

# INFO level for production (change to DEBUG for troubleshooting)
logging.level=INFO

# Always enable audit logging in production
logging.audit.enabled=true
logging.performance.enabled=true

# =============================================================================
# PRODUCTION SPECIFIC SETTINGS
# =============================================================================

# Enable production mode
production.mode=true

# Disable detailed errors in production for security
production.detailed.errors=false

# Disable development features
production.dev.features=false

# =============================================================================
# ENVIRONMENT SPECIFIC OVERRIDES
# =============================================================================
# These can be overridden via system properties:
# -Dsleuth.server.port=3658
# -Dsleuth.security.input.validation=true
# -Dsleuth.monitoring.metrics.enabled=true