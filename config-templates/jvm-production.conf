# Java-Sleuth Production JVM Configuration
# Optimized for production workloads with emphasis on low latency and stability

# =============================================================================
# MEMORY CONFIGURATION
# =============================================================================

# Heap size - adjust based on available system memory
# For 8GB system: -Xms2g -Xmx4g
# For 16GB system: -Xms4g -Xmx8g
# For 32GB system: -Xms8g -Xmx16g
-Xms2g
-Xmx4g

# Metaspace (method area) configuration
-XX:MetaspaceSize=256m
-XX:MaxMetaspaceSize=512m

# Direct memory (off-heap) limit
-XX:MaxDirectMemorySize=1g

# =============================================================================
# GARBAGE COLLECTION CONFIGURATION
# =============================================================================

# Use G1GC for low-latency, high-throughput applications
-XX:+UseG1GC

# G1GC specific tuning
-XX:G1HeapRegionSize=16m
-XX:MaxGCPauseMillis=200
-XX:G1NewSizePercent=30
-XX:G1MaxNewSizePercent=40
-XX:G1HeapWastePercent=5
-XX:G1MixedGCCountTarget=8
-XX:G1MixedGCLiveThresholdPercent=85

# Enable G1 optimizations
-XX:+G1UseAdaptiveIHOP
-XX:G1AdaptiveIHOPNumInitialSamples=3
-XX:+UseStringDeduplication

# Alternative: Parallel GC for high-throughput applications
# Uncomment these and comment G1GC settings above for throughput-focused workloads
# -XX:+UseParallelGC
# -XX:ParallelGCThreads=8
# -XX:MaxGCPauseMillis=200

# Alternative: ZGC for ultra-low latency (Java 11+)
# Uncomment for applications requiring < 10ms GC pauses
# -XX:+UnlockExperimentalVMOptions
# -XX:+UseZGC
# -XX:ZCollectionInterval=5

# =============================================================================
# PERFORMANCE OPTIMIZATIONS
# =============================================================================

# JIT Compiler optimizations
-XX:+UseCompressedOops
-XX:+UseCompressedClassPointers
-XX:+OptimizeStringConcat
-XX:+UseStringCache

# Large pages for better memory performance (requires OS configuration)
-XX:+UseLargePages
-XX:LargePageSizeInBytes=2m

# Biased locking optimization
-XX:+UseBiasedLocking
-XX:BiasedLockingStartupDelay=0

# Code cache optimization
-XX:InitialCodeCacheSize=64m
-XX:ReservedCodeCacheSize=256m
-XX:CodeCacheExpansionSize=64k

# Class loading optimizations
-XX:+TieredCompilation
-XX:TieredStopAtLevel=4

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================

# Use urandom for better entropy
-Djava.security.egd=file:/dev/./urandom

# Disable JMX authentication for internal monitoring (enable in DMZ)
-Dcom.sun.management.jmxremote
-Dcom.sun.management.jmxremote.port=9999
-Dcom.sun.management.jmxremote.authenticate=false
-Dcom.sun.management.jmxremote.ssl=false
-Dcom.sun.management.jmxremote.local.only=false

# For production with external access, enable authentication:
# -Dcom.sun.management.jmxremote.authenticate=true
# -Dcom.sun.management.jmxremote.password.file=/path/to/jmxremote.password
# -Dcom.sun.management.jmxremote.access.file=/path/to/jmxremote.access
# -Dcom.sun.management.jmxremote.ssl=true

# =============================================================================
# DEBUGGING AND DIAGNOSTICS
# =============================================================================

# Enable helpful VM options for production debugging
-XX:+PrintGCDetails
-XX:+PrintGCTimeStamps
-XX:+PrintGCDateStamps
-XX:+UseGCLogFileRotation
-XX:NumberOfGCLogFiles=5
-XX:GCLogFileSize=10M
-Xloggc:logs/gc-%t.log

# Enable heap dump on OutOfMemoryError
-XX:+HeapDumpOnOutOfMemoryError
-XX:HeapDumpPath=logs/heapdump-%t.hprof

# Enable JFR (Java Flight Recorder) for production monitoring
-XX:+FlightRecorder
-XX:StartFlightRecording=duration=60s,filename=logs/sleuth-startup.jfr

# Print useful information at startup
-XX:+PrintCommandLineFlags
-XX:+PrintFlagsFinal

# =============================================================================
# SYSTEM PROPERTIES
# =============================================================================

# File encoding
-Dfile.encoding=UTF-8
-Dsun.jnu.encoding=UTF-8

# Network performance
-Djava.net.preferIPv4Stack=true
-Djava.net.useSystemProxies=true

# Logging configuration
-Djava.util.logging.config.file=${SLEUTH_CONFIG}/logging.properties

# Application specific properties
-Dsleuth.config.dir=${SLEUTH_CONFIG}
-Dsleuth.logs.dir=${SLEUTH_LOGS}
-Dsleuth.production.mode=true

# =============================================================================
# MONITORING AND OBSERVABILITY
# =============================================================================

# Enable detailed thread information
-XX:+PrintConcurrentLocks

# Enable NUMA awareness (for multi-socket systems)
-XX:+UseNUMA

# Enable aggressive optimizations (use with caution)
# -XX:+AggressiveOpts

# =============================================================================
# CONTAINER SPECIFIC SETTINGS
# =============================================================================

# For Docker/Kubernetes deployments, uncomment these:
# Respect container memory limits
# -XX:+UseContainerSupport
# -XX:InitialRAMPercentage=25.0
# -XX:MaxRAMPercentage=75.0

# For cgroup v1 compatibility
# -XX:+UnlockExperimentalVMOptions
# -XX:+UseCGroupMemoryLimitForHeap

# =============================================================================
# DEVELOPMENT/STAGING SPECIFIC
# =============================================================================

# Uncomment for development/staging environments only:
# More verbose error reporting
# -XX:+ShowCodeDetailsInExceptionMessages
# -XX:+UnlockDiagnosticVMOptions
# -XX:+LogVMOutput

# =============================================================================
# NOTES
# =============================================================================

# 1. Adjust -Xms and -Xmx based on your system's available memory
# 2. Monitor GC logs to tune pause time goals
# 3. Use profiling tools to identify hotspots
# 4. Test configuration changes in staging before production
# 5. Consider workload characteristics when choosing GC algorithm
# 6. Regular monitoring of memory usage and GC behavior is essential