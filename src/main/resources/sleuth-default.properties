# Java-Sleuth Default Configuration
# This file contains default settings for Java-Sleuth agent
# Override these settings by creating sleuth.properties in the config directory

# =============================================================================
# SERVER CONFIGURATION
# =============================================================================

# Port for the command server (default: 3658)
server.bind.address=127.0.0.1
server.port=3658

# Maximum number of concurrent connections
server.max.connections=10

# Connection timeout in milliseconds
server.connection.timeout=30000

# Socket timeout in milliseconds for accept operations
server.socket.timeout=1000

# =============================================================================
# PERFORMANCE CONFIGURATION
# =============================================================================

# Cache time-to-live in milliseconds (5 seconds)
performance.cache.ttl=5000

# Thread pool core size
performance.thread.pool.core=4

# Thread pool maximum size
performance.thread.pool.max=16

# Command execution timeout in milliseconds
performance.command.timeout=60000

# Force periodic System.gc() during maintenance (NOT recommended in production)
performance.maintenance.force_gc=false

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================

# Enable input validation (true/false)
security.input.validation=true

# Enable audit logging (true/false)
security.audit.logging=true

# Maximum command length in characters
security.max.command.length=1000

# Comma-separated list of allowed commands (* for all)
security.allowed.commands=*

# Security mode: off|hmac (default: off)
security.mode=off

# HMAC shared secret (required when security.mode=hmac)
security.hmac.secret=

# Allowed timestamp skew in milliseconds for HMAC signed requests
security.hmac.timestamp.window.ms=30000

# Nonce cache size for replay protection
security.hmac.nonce.cache.size=10000

# =============================================================================
# MONITORING CONFIGURATION
# =============================================================================

# Enable metrics collection (true/false)
monitoring.metrics.enabled=true

# Enable health checks (true/false)
monitoring.health.checks=true

# Cache cleanup interval in milliseconds (5 minutes)
monitoring.cache.cleanup.interval=300000

# Enable JMX monitoring (true/false)
monitoring.jmx.enabled=true

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================

# Logging level (TRACE, DEBUG, INFO, WARN, ERROR)
logging.level=INFO

# Enable audit logging to file (true/false)
logging.audit.enabled=true

# Enable performance logging (true/false)
logging.performance.enabled=true

# =============================================================================
# PRODUCTION SPECIFIC SETTINGS
# =============================================================================

# Enable production mode optimizations
production.mode=false

# Enable detailed error reporting (disable in production)
production.detailed.errors=false

# Enable development features (disable in production)
production.dev.features=false

# =============================================================================
# PROTOCOL CONFIGURATION
# =============================================================================
protocol.mode=legacy
protocol.streaming.enabled=true
protocol.frame.max.payload=4096
protocol.handshake.enabled=true
# Max UTF-8 bytes per single-line request/response in text protocols (legacy/framed/handshake)
protocol.text.max.line.bytes=8192

# =============================================================================
# PLUGIN CONFIGURATION
# =============================================================================
plugins.directory=plugins
plugins.conflict.strategy=prefer-builtin

# =============================================================================
# MONITORING QUEUE CONFIGURATION
# =============================================================================
monitoring.watch.queue.capacity=1000
monitoring.watch.drop.on.full=true
monitoring.trace.queue.capacity=2000
monitoring.trace.drop.on.full=true
monitoring.trace.sample.rate=1.0

# =============================================================================
# SECURITY AUTHORIZATION CONFIGURATION
# =============================================================================
security.authorization.enabled=true
security.anonymous.viewer=false
